name: CI/CD Pipeline

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Backend (dev)
        uses: actions/checkout@v3
        with:
          ref: dev

      - name: Checkout Test Repo
        uses: actions/checkout@v3
        with:
          repository: vinay-hegde-17/VinayTestAutomation
          ref: dev
          path: tests

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Test Dependencies
        run: |
          cd tests
          python -m pip install -r requirements.txt

      - name: Run Backend in Background
        run: |
          nohup python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5  # wait for server to start

      - name: Run Pytest
        run: |
          cd tests
          pytest

  merge-and-build:
    needs: test
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout Backend
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Merge dev -> main (Backend)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout main
          git merge origin/dev --no-edit
          git push origin main
          git checkout dev
          git merge origin/main --no-edit
          git push origin dev

      - name: Checkout Test Repo
        uses: actions/checkout@v3
        with:
          repository: vinay-hegde-17/VinayTestAutomation
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0
          path: tests

      - name: Merge dev -> main (Test Repo)
        run: |
          cd tests
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout main
          git merge origin/dev --no-edit
          git push origin main
          git checkout dev
          git merge origin/main --no-edit
          git push origin dev

      - name: Build Backend App
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
          echo "Backend app built successfully"
