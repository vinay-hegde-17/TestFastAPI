permissions:
  contents: write

name: FastAPI CI Pipeline

on:
  push:
    branches:
      - dev

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-html requests

      - name: Start backend
        run: |
          source venv/bin/activate
          nohup uvicorn main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
          sleep 10

      - name: Verify backend
        run: curl --retry 5 --retry-delay 3 --fail http://127.0.0.1:8000/docs

      - name: Run pytest
        run: |
          source venv/bin/activate
          mkdir -p reports
          pytest --html=reports/test_report.html --self-contained-html --tb=short

      - name: Upload test report
        uses: actions/upload-artifact@v3
        with:
          name: test-report
          path: backend/reports/test_report.html

  merge-to-main:
    needs: test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge dev into main
        run: |
          git checkout main
          git merge dev --no-ff -m "Auto-merge dev into main [skip ci]"
          git push origin main

  build:
    needs: merge-to-main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Build package
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Build completed"
