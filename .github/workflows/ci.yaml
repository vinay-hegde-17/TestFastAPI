name: FastAPI CI/CD

on:
  push:
    branches:
      - dev   # run when pushing to dev
  pull_request:
    branches:
      - dev

jobs:
  build-test:
    runs-on: ubuntu-latest

    env:
      BACKEND_REPO: https://github.com/vinay-hegde-17/TestFastAPI.git
      TEST_REPO: https://github.com/vinay-hegde-17/VinayTestAutomation.git

    steps:
      # Checkout backend (dev branch)
      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          repository: vinay-hegde-17/TestFastAPI
          ref: dev
          path: backend

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Backend dependencies
      - name: Install Backend Dependencies
        working-directory: backend
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Start Backend in background
      - name: Start Backend
        working-directory: backend
        run: |
          nohup venv/bin/python -m uvicorn main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
          sleep 5

      # Verify Backend
      - name: Verify Backend
        run: curl --fail http://127.0.0.1:8000/docs

      # Checkout tests
      - name: Checkout Tests
        uses: actions/checkout@v4
        with:
          repository: vinay-hegde-17/VinayTestAutomation
          ref: dev
          path: tests

      # Test dependencies
      - name: Install Test Dependencies
        working-directory: tests
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests pytest pytest-html

      # Run Tests
      - name: Run Pytest
        working-directory: tests
        run: |
          source venv/bin/activate
          mkdir -p reports
          pytest --html=reports/test_report.html --self-contained-html --tb=short

      # Upload Test Report (artifact)
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: tests/reports/test_report.html

  merge-to-main:
    needs: build-test
    runs-on: ubuntu-latest
    if: ${{ success() }}

    steps:
      # Checkout backend repo again
      - name: Checkout Backend Repo
        uses: actions/checkout@v4
        with:
          repository: vinay-hegde-17/TestFastAPI
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}
          path: backend

      - name: Merge Dev into Main
        working-directory: backend
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch origin
          git checkout main
          git merge dev --no-edit
          git push origin main

  trigger-vercel:
    needs: merge-to-main
    runs-on: ubuntu-latest
    if: ${{ success() }}

    steps:
      - name: Notify Vercel
        run: echo "🚀 Main branch updated - Vercel will auto-deploy"
